on:
  push:
    tags: ["v*"]
    branches: [release]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcre3-dev cmake build-essential
      - name: Create build directory
        run: mkdir build
      - name: Configure CMake Build
        working-directory: ./build
        run: cmake -DCMAKE_BUILD_TYPE=Release ..
      - name: Build executable
        working-directory: ./build
        run: cmake --build . && mv ./promptsynth ./promptsynth-linux
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REF_NAME: ${{ github.ref_name }}
        working-directory: ./build
        run: gh release create "$GH_REF_NAME" ./promptsynth-linux --notes "Auto-generated release"
concurrency:
  group: "prompsynth-build-publish"
  cancel-in-progress: true
